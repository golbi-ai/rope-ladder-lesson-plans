name: Validate catalog

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - run: go run ./cmd/catalog-validate
